<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 函數與陣列練習題</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: #4ade80;
            height: 100%;
            transition: width 0.3s ease;
        }
        .question-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .question-number {
            background: #11998e;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .question-title {
            background: #ef4444;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .question-text {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .code-editor {
            width: 100%;
            height: 200px;
            background: #1e293b;
            color: #e2e8f0;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            resize: vertical;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn {
            padding: 12px 24px;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn-run {
            background: #11998e;
        }
        .btn-run:hover {
            background: #0d7d6f;
        }
        .btn-hint {
            background: #f59e0b;
        }
        .btn-hint:hover {
            background: #d97706;
        }
        .output-area {
            margin-top: 12px;
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
            min-height: 60px;
            font-family: 'Courier New', monospace;
            border: 2px dashed #cbd5e1;
        }
        .output-label {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .hint-box {
            margin-top: 12px;
            padding: 12px;
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            color: #92400e;
            display: none;
        }
        .hint-box.show {
            display: block;
        }
        .btn-nav {
            background: #11998e;
        }
        .btn-nav:disabled {
            background: #ccc;
            cursor: default;
        }
        .btn {
            cursor: pointer;
        }
        .btn:disabled {
            cursor: default;
        }
        .result-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .result-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .result-text {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }
        .restart-btn {
            background: #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JavaScript 函數與陣列練習題</h1>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="quizContainer"></div>
        <div id="resultContainer" style="display: none;"></div>
    </div>

    <script>
        const questions = [
            {
                title: "1. Callback 基礎實作",
                question: "建立一個名為 mathTool 的函數。它接受三個參數：num1, num2 以及一個 action（回呼函數）。要求：呼叫 mathTool(10, 5, ...) 時，分別傳入不同的匿名函數來達成「相加」與「相減」。範例輸出：15, 5",
                hint: "function mathTool(num1, num2, action) {\n  return action(num1, num2);\n}\n\n// 相加\nconsole.log(mathTool(10, 5, function(a, b) { return a + b; }));\n\n// 相減\nconsole.log(mathTool(10, 5, function(a, b) { return a - b; }));"
            },
            {
                title: "2. 匿名函數與立即執行 (IIFE)",
                question: "寫出一個立即執行函數 (IIFE)，該函數內部定義一個區域變數 count = 100，並在執行時直接在控制台印出 \"Count is: 100\"。要求：確保外部無法存取到這個 count 變數。",
                hint: "(function() {\n  var count = 100;\n  console.log(\"Count is: \" + count);\n})();\n\n// 嘗試在外部存取 count（會報錯）\n// console.log(count); // ReferenceError"
            },
            {
                title: "3. 箭頭函數與陣列轉換",
                question: "給定一個陣列 const prices = [100, 200, 300, 400]。請使用 map 方法結合箭頭函數，產生一個新陣列，內容是原價格打 8 折後的結果。要求：程式碼需簡潔，盡量使用單行箭頭函數。",
                hint: "const prices = [100, 200, 300, 400];\nconst discounted = prices.map(p => p * 0.8);\nconsole.log(discounted); // [80, 160, 240, 320]"
            },
            {
                title: "4. 陣列參數的「破壞性修改」",
                question: "撰寫一個函數 cleanData(arr)。內部邏輯：使用陣列方法移除傳進來的陣列最後一個元素，並在最前面加上 \"Start\"。驗證：宣告 let myData = [1, 2, 3]，執行 cleanData(myData) 後，觀察 myData 的內容。",
                hint: "function cleanData(arr) {\n  arr.pop();       // 移除最後一個元素\n  arr.unshift(\"Start\"); // 在最前面加入\n}\n\nlet myData = [1, 2, 3];\ncleanData(myData);\nconsole.log(myData); // [\"Start\", 1, 2]\n// 注意：myData 被修改了！"
            },
            {
                title: "5. 函數回傳函數 (Higher-Order Function)",
                question: "寫一個函數 multiplier(factor)，它會「回傳」另一個箭頭函數。這個被回傳的函數接受一個數字參數 n，並回傳 n * factor。範例用法：const double = multiplier(2); console.log(double(10)); // 預期輸出 20",
                hint: "function multiplier(factor) {\n  return (n) => n * factor;\n}\n\nconst double = multiplier(2);\nconsole.log(double(10)); // 20\n\nconst triple = multiplier(3);\nconsole.log(triple(10)); // 30"
            },
            {
                title: "6. Callback 篩選器",
                question: "手寫一個類似 filter 的函數，名為 myFilter(arr, callback)。邏輯：建立一個新陣列，遍歷 arr，若 callback(item) 回傳為 true，則將該元素放入新陣列。測試：使用此函數篩選出 [1, 5, 8, 12] 中大於 7 的數字。",
                hint: "function myFilter(arr, callback) {\n  const result = [];\n  for (let item of arr) {\n    if (callback(item)) {\n      result.push(item);\n    }\n  }\n  return result;\n}\n\nconst numbers = [1, 5, 8, 12];\nconst filtered = myFilter(numbers, n => n > 7);\nconsole.log(filtered); // [8, 12]"
            },
            {
                title: "7. 箭頭函數處理物件",
                question: "給定一個包含物件的陣列 const users = [{name: \"Alice\", age: 25}, {name: \"Bob\", age: 17}]。任務：使用 filter 與箭頭函數，篩選出所有 age 大於或等於 18 的人。",
                hint: "const users = [\n  {name: \"Alice\", age: 25},\n  {name: \"Bob\", age: 17}\n];\n\nconst adults = users.filter(user => user.age >= 18);\nconsole.log(adults); // [{name: \"Alice\", age: 25}]"
            },
            {
                title: "8. 參數傳址陷阱：重新賦值 vs 修改",
                question: "請問以下程式碼執行後，listA 與 listB 的內容分別是什麼？為什麼？\n\nlet listA = [1, 2];\nlet listB = [3, 4];\n\nfunction process(a, b) {\n  a.push(99);\n  b = [100];\n}\nprocess(listA, listB);",
                hint: "// 執行後\nconsole.log(listA); // [1, 2, 99]\nconsole.log(listB); // [3, 4]\n\n// 原因：\n// 1. a.push(99) 修改了 listA（傳址）\n// 2. b = [100] 只是改變了函式內部參數 b 的指向，不影響外部的 listB"
            },
            {
                title: "9. 延遲執行的 Callback",
                question: "使用 setTimeout。要求在 2 秒後，利用箭頭函數印出陣列 [\"Task\", \"Completed\"] 中組合起來的字串 \"Task Completed\"。",
                hint: "setTimeout(() => {\n  const arr = [\"Task\", \"Completed\"];\n  console.log(arr.join(\" \"));\n}, 2000);"
            },
            {
                title: "10. 綜合應用：計算總價",
                question: "寫一個函數 calculateTotal(cart, discountFunc)。cart 是一個數字陣列（商品價格）。discountFunc 是一個處理折扣的 callback。任務：先將 cart 內所有數字相加，再將總和傳入 discountFunc 處理後回傳。測試：傳入 [100, 200, 300] 並透過匿名函數扣除 50 元。",
                hint: "function calculateTotal(cart, discountFunc) {\n  const sum = cart.reduce((acc, price) => acc + price, 0);\n  return discountFunc(sum);\n}\n\nconst cart = [100, 200, 300];\nconst total = calculateTotal(cart, function(sum) {\n  return sum - 50;\n});\nconsole.log(total); // 550"
            }
        ];

        let currentQuestion = 0;
        let hintVisible = [];

        function renderQuestion(index) {
            const q = questions[index];
            const quizContainer = document.getElementById('quizContainer');
            
            const progress = ((index) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            quizContainer.innerHTML = `
                <div class="question-card">
                    <div class="question-header">
                        <span class="question-number">第 ${index + 1} 題</span>
                        <span class="question-title">${q.title}</span>
                    </div>
                    <div class="question-text">${q.question.replace(/\n/g, '<br>')}</div>
                    <textarea class="code-editor" id="codeEditor" placeholder="在此輸入你的程式碼..."></textarea>
                    <div class="btn-row">
                        <button class="btn btn-run" onclick="runCode()">▶ 執行</button>
                        <button class="btn btn-hint" onclick="toggleHint()">💡 提示</button>
                        ${index < questions.length - 1 
                            ? `<button class="btn btn-nav" onclick="nextQuestion()">下一題 →</button>`
                            : `<button class="btn btn-nav" onclick="showResult()">完成 ✓</button>`
                        }
                        ${index > 0 
                            ? `<button class="btn btn-nav" onclick="prevQuestion()">← 上一題</button>`
                            : ''
                        }
                    </div>
                    <div class="hint-box" id="hintBox">
                        <strong>提示：</strong><br><br>
                        <pre>${q.hint}</pre>
                    </div>
                    <div class="output-area">
                        <div class="output-label">輸出結果：</div>
                        <div id="output"></div>
                    </div>
                </div>
            `;
        }

        function runCode() {
            const code = document.getElementById('codeEditor').value;
            const output = document.getElementById('output');
            
            let result = [];
            const originalLog = console.log;
            console.log = function(...args) {
                result.push(args.map(arg => 
                    typeof arg === 'object' ? JSON.stringify(arg) : arg
                ).join(' '));
            };

            try {
                eval(code);
                output.innerHTML = result.length > 0 ? result.join('<br>') : '（無輸出）';
            } catch (e) {
                output.innerHTML = `<span style="color: #ef4444;">錯誤：${e.message}</span>`;
            }

            console.log = originalLog;
        }

        function toggleHint() {
            const hintBox = document.getElementById('hintBox');
            if (hintVisible[currentQuestion]) {
                hintBox.classList.remove('show');
                hintVisible[currentQuestion] = false;
            } else {
                hintBox.classList.add('show');
                hintVisible[currentQuestion] = true;
            }
        }

        function nextQuestion() {
            currentQuestion++;
            renderQuestion(currentQuestion);
        }

        function prevQuestion() {
            currentQuestion--;
            renderQuestion(currentQuestion);
        }

        function showResult() {
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('quizContainer').innerHTML = '';
            
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.style.display = 'block';
            
            resultContainer.innerHTML = `
                <div class="result-card">
                    <div class="result-icon">🎉</div>
                    <div class="result-text">恭喜完成所有 ${questions.length} 題練習！</div>
                    <button class="btn restart-btn" onclick="restart()">重新開始</button>
                </div>
            `;
        }

        function restart() {
            currentQuestion = 0;
            hintVisible = new Array(questions.length).fill(false);
            document.getElementById('resultContainer').style.display = 'none';
            renderQuestion(0);
        }

        hintVisible = new Array(questions.length).fill(false);
        renderQuestion(0);
    </script>
</body>
</html>
