<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 函數與參數練習題</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: #4ade80;
            height: 100%;
            transition: width 0.3s ease;
        }
        .question-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .question-number {
            background: #667eea;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .score-display {
            background: #10b981;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .question-text {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            margin-bottom: 16px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }
        .option:hover:not(.disabled) {
            border-color: #667eea;
            background: #f8fafc;
        }
        .option.correct {
            border-color: #10b981;
            background: #d1fae5;
        }
        .option.wrong {
            border-color: #ef4444;
            background: #fee2e2;
        }
        .option.disabled {
            cursor: default;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 20px;
        }
        .btn:hover {
            background: #5568d3;
        }
        .btn:disabled {
            background: #ccc;
            cursor: default;
        }
        .result-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .result-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .result-text {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }
        .restart-btn {
            background: #10b981;
        }
        .restart-btn:hover {
            background: #059669;
        }
        .explanation {
            margin-top: 12px;
            padding: 12px;
            background: #f0f9ff;
            border-left: 4px solid #3b82f6;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            color: #475569;
            display: none;
        }
        .explanation.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JavaScript 函數與參數練習題</h1>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="quizContainer"></div>
        <div id="resultContainer" style="display: none;"></div>
    </div>

    <script>
        const questions = [
            {
                question: "關於 Arrow Function，以下哪個描述是正確的？",
                code: "const obj = {\n  value: 10,\n  regular: function() { return this.value; },\n  arrow: () => { return this.value; }\n};",
                options: [
                    "Arrow function 有自己的 this",
                    "Arrow function 沒有自己的 this",
                    "兩者 this 綁定完全相同",
                    "Arrow function 的 this 是動態的"
                ],
                answer: 1,
                explanation: "Arrow function 沒有自己的 this 綁定，會繼承外層的 this 值。"
            },
            {
                question: "關於 Default Parameters（預設參數），以下哪個描述是正確的？",
                code: "function greet(name = '訪客') {\n  return '你好，' + name;\n}",
                options: [
                    "當呼叫函式未傳遞參數時，參數使用預設值",
                    "預設參數可以修改傳入的引數",
                    "預設參數只能在最後一個參數使用",
                    "預設參數不能與 undefined 比較"
                ],
                answer: 0,
                explanation: "Default Parameters 允許在參數未傳遞或傳入 undefined 時使用預設值。"
            },
            {
                question: "關於 Rest Parameters（其餘參數），以下哪個描述是正確的？",
                options: [
                    "用於展開陣列或物件",
                    "收集其餘傳入的參數形成一個陣列",
                    "只能用於物件的屬性",
                    "必須放在參數的最前面"
                ],
                answer: 1,
                explanation: "Rest Parameters 使用 ... 語法，可將多個參數收集為一個陣列。"
            },
            {
                question: "關於 Spread Operator 和 Rest Parameters，以下哪個描述是正確的？",
                code: "const arr1 = [1, 2, 3];\nconst arr2 = [...arr1, 4, 5];",
                options: [
                    "兩者語法完全相同但用途相反",
                    "Rest Parameters 用於解構",
                    "Spread Operator 用於合併陣列",
                    "兩者都是用於定義函式參數"
                ],
                answer: 0,
                explanation: "兩者都使用 ... 語法，但 Rest Parameters 收集參數，Spread Operator 展開陣列/物件。"
            },
            {
                question: "關於 Hoisting（提升），以下哪個描述是正確的？",
                code: "console.log(add(2, 3));\n\nfunction add(a, b) {\n  return a + b;\n}",
                options: [
                    "函式陳述式可以被提升",
                    "函式表達式可以被完全提升",
                    "變數宣告不可以被提升",
                    "提升會改變程式碼的執行順序"
                ],
                answer: 0,
                explanation: "函式陳述式會被提升到作用域頂部，可以在宣告前呼叫。"
            },
            {
                question: "關於 Pure Function（純函數），以下哪個描述是正確的？",
                code: "function add(a, b) {\n  return a + b;\n}",
                options: [
                    "相同輸入產生相同輸出，且不改變外在狀態",
                    "使用箭頭語法撰寫的函式",
                    "有明確回傳值的函式",
                    "不使用任何參數的函式"
                ],
                answer: 0,
                explanation: "Pure Function 相同輸入永遠產生相同輸出，且不改變外部狀態或產生副作用。"
            },
            {
                question: "關於 Callback Function（回調函數），以下哪個描述是正確的？",
                code: "setTimeout(function() {\n  console.log('延遲執行');\n}, 1000);",
                options: [
                    "將函式當作參數傳入另一個函式",
                    "在函式外部執行的函式",
                    "會自動重複執行的函式",
                    "必須有回傳值的函式"
                ],
                answer: 0,
                explanation: "Callback function 是作為參數傳遞給另一個函數的函數，會在適當時機被呼叫執行。"
            },
            {
                question: "關於 Closure（閉包），以下哪個描述是正確的？",
                code: "function outer() {\n  let count = 0;\n  return function inner() {\n    count++;\n    return count;\n  };\n}",
                options: [
                    "函式可以記住並存取其建立時的作用域",
                    "閉包會建立新的全域變數",
                    "閉包只能用於物件導向程式設計",
                    "閉包會自動釋放記憶體"
                ],
                answer: 0,
                explanation: "Closure 是函式能夠記住並存取其建立時作用域的變數的功能。"
            },
            {
                question: "關於 IIFE（立即呼叫函式表達式），以下哪個描述是正確的？",
                code: "(function() {\n  var local = '只在這裡有效';\n  console.log(local);\n})();",
                options: [
                    "建立封閉作用域，避免全域變數污染",
                    "提高函式執行效能",
                    "讓函式可以被重複呼叫",
                    "使函式可以接受多個參數"
                ],
                answer: 0,
                explanation: "IIFE 會立即執行，可用來建立封閉的作用域，避免內部變數污染全域環境。"
            },
            {
                question: "關於函式作用域與閉包，以下程式碼輸出什麼？",
                code: "function counter() {\n  let count = 0;\n  return {\n    increment: function() { count++; },\n    getCount: function() { return count; }\n  };\n}\nconst c = counter();\nc.increment();\nc.increment();\nconsole.log(c.getCount());",
                options: [
                    "0",
                    "1",
                    "2",
                    "undefined"
                ],
                answer: 2,
                explanation: "閉包讓 inner functions 可以存取並修改 outer function 的 count 變數，所以輸出 2。"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = [];

        function renderQuestion(index) {
            const q = questions[index];
            const quizContainer = document.getElementById('quizContainer');
            
            const progress = ((index) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            let codeHtml = q.code ? `<div class="code-block">${q.code}</div>` : '';
            
            let optionsHtml = q.options.map((opt, i) => 
                `<div class="option" data-index="${i}" onclick="selectOption(${i})">${opt}</div>`
            ).join('');

            quizContainer.innerHTML = `
                <div class="question-card">
                    <div class="question-header">
                        <span class="question-number">第 ${index + 1} 題</span>
                        <span class="score-display">得分：${score} / ${questions.length}</span>
                    </div>
                    <div class="question-text">${q.question}</div>
                    ${codeHtml}
                    <div class="options">${optionsHtml}</div>
                    <div class="explanation" id="explanation"></div>
                    ${index < questions.length - 1 
                        ? `<button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>下一題</button>`
                        : `<button class="btn" id="nextBtn" onclick="showResult()" disabled>查看結果</button>`
                    }
                </div>
            `;
        }

        function selectOption(index) {
            if (answered[currentQuestion] !== undefined) return;
            
            answered[currentQuestion] = index;
            const q = questions[currentQuestion];
            const options = document.querySelectorAll('.option');
            
            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (i === q.answer) {
                    opt.classList.add('correct');
                } else if (i === index && index !== q.answer) {
                    opt.classList.add('wrong');
                }
            });

            if (index === q.answer) {
                score++;
            }

            const explanation = document.getElementById('explanation');
            explanation.innerHTML = `<strong>解析：</strong>${q.explanation}`;
            explanation.classList.add('show');

            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentQuestion++;
            renderQuestion(currentQuestion);
        }

        function showResult() {
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('quizContainer').innerHTML = '';
            
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.style.display = 'block';
            
            let icon, message;
            if (score === questions.length) {
                icon = '🎉';
                message = '太棒了！全部答對！';
            } else if (score >= questions.length * 0.7) {
                icon = '👏';
                message = '很不錯！繼續保持！';
            } else if (score >= questions.length * 0.5) {
                icon = '💪';
                message = '還可以喔！再加油！';
            } else {
                icon = '📚';
                message = '建議再複習一下基礎概念';
            }

            resultContainer.innerHTML = `
                <div class="result-card">
                    <div class="result-icon">${icon}</div>
                    <div class="result-score">${score} / ${questions.length}</div>
                    <div class="result-text">${message}</div>
                    <button class="btn restart-btn" onclick="restart()">重新挑戰</button>
                </div>
            `;
        }

        function restart() {
            currentQuestion = 0;
            score = 0;
            answered = [];
            document.getElementById('resultContainer').style.display = 'none';
            renderQuestion(0);
        }

        renderQuestion(0);
    </script>
</body>
</html>
